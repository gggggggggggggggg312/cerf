site_name: CERF
site_description: CE Runtime Foundation - a virtual hardware platform that boots real Windows CE and Windows Mobile ROMs on modern Windows.
site_url: https://cerf.dz3n.net/
repo_url: https://github.com/gweslab/cerf
repo_name: gweslab/cerf
copyright: gweslab

docs_dir: content
site_dir: ../../build/site

theme:
  name: material
  language: en
  logo: assets/img/gweslab.png
  favicon: assets/img/gweslab.png
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: teal
      toggle:
        icon: material/weather-night
        name: Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Light mode

nav:
  - Home: index.md
  - Download: download.md
  - Boards: boards.md
  - Guides: guides/index.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.keys
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - assets/cerf.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/gweslab/cerf
    - icon: fontawesome/brands/discord
      link: https://discord.gg/QREE9Y2v2d

plugins:
  - search
