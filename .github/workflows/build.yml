name: build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    if: >-
      ${{ !contains(github.event.head_commit.message, '[skip build]') &&
          (github.event_name != 'pull_request' ||
           github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: windows-latest

    strategy:
      matrix:
        configuration: [Release]
        # configuration: [Release, Debug]
        platform: [Win32]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Cache vcpkg deps
        uses: actions/cache@v4
        with:
          path: vcpkg_installed
          key: vcpkg-${{ runner.os }}-x86-windows-static-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-x86-windows-static-

      - name: Cache vcpkg source downloads
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\downloads
          key: vcpkg-downloads-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-downloads-${{ runner.os }}-

      - name: Activate vcpkg MSBuild integration
        shell: pwsh
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" integrate install

      - name: Stamp version.h with CI build info
        id: version
        shell: pwsh
        run: |
          $vh   = Get-Content cerf/version.h -Raw
          $maj  = [regex]::Match($vh, 'CERF_VERSION_MAJOR\s+(\d+)').Groups[1].Value
          $min  = [regex]::Match($vh, 'CERF_VERSION_MINOR\s+(\d+)').Groups[1].Value
          $pat  = [regex]::Match($vh, 'CERF_VERSION_PATCH\s+(\d+)').Groups[1].Value
          $sha  = "${{ github.sha }}".Substring(0, 7)
          $ts   = [DateTime]::UtcNow.ToString("yyyy-MM-dd HH:mm") + " UTC"
          $run  = "${{ github.run_number }}"
          $ver  = "$maj.$min.$pat"
          $disp = "$ver ($ts, $sha)"
          $vh = $vh -replace '(?m)^#define\s+CERF_VERSION_BUILD\s+\d+', "#define CERF_VERSION_BUILD $run"
          $vh = $vh -replace '(?m)^#define\s+CERF_VERSION_DISPLAY_STR\s+.*$',  "#define CERF_VERSION_DISPLAY_STR   `"$disp`""
          $vh = $vh -replace '(?m)^#define\s+CERF_VERSION_DISPLAY_WSTR\s+.*$', "#define CERF_VERSION_DISPLAY_WSTR  L`"$disp`""
          Set-Content cerf/version.h -Value $vh -Encoding utf8 -NoNewline
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "sha=$sha"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Stamped: $disp (build $run)"

      - name: Fetch CE build tools (private R2 mirror)
        shell: pwsh
        run: |
          curl.exe -fsSL "${{ secrets.CE_TOOLCHAIN_URL }}" -o "$env:RUNNER_TEMP\ce-tools.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP\ce-tools.zip" -DestinationPath "$env:RUNNER_TEMP\ce-tools" -Force
          $sdk = Get-ChildItem "$env:RUNNER_TEMP\ce-tools" -Recurse -Directory -Filter STANDARDSDK -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $sdk) { throw "CE toolchain zip has no STANDARDSDK folder" }
          New-Item -ItemType Directory -Force third_party | Out-Null
          if (Test-Path third_party\wince) { Remove-Item third_party\wince -Recurse -Force }
          Move-Item $sdk.Parent.FullName third_party\wince
          Write-Host "CE toolchain ready at third_party/wince"

      - name: Build
        shell: pwsh
        run: ./build.ps1 -Config ${{matrix.configuration}} -Mode production

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CERF-${{ steps.version.outputs.version }}-${{ steps.version.outputs.sha }}-${{matrix.configuration}}-${{matrix.platform}}
          path: ./build/${{matrix.configuration}}/${{matrix.platform}}/

  release:
    needs: build
    if: github.event_name == 'push' && contains(github.event.head_commit.message, '[release cerf]')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Settle the artifact API
        run: sleep 60

      - name: Publish the release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          DISCORD_SECRET: ${{ secrets.DISCORD_SECRET }}
        run: python3 tools/deploy.py --yes --sha=${{ github.sha }}
